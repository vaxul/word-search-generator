# Build, verify, and deploy the SPA to GitHub Pages.
# Trigger: every push to main (each merged change ships) plus a manual run.
# `npm run verify` gates the deploy — a red type-check/lint/test fails the job
# before the build artifact is produced, so a broken commit never deploys.
# (docs/specs/spec-scaffold.md — Prior decisions: deploy trigger; Vite base.)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: Pages deploy needs to write Pages and mint an OIDC
# token for the deploy-pages action; the checkout only needs read access.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running deploy so a
# push mid-deploy waits rather than aborting a half-applied publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (type-check + lint + test)
        run: npm run verify

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
